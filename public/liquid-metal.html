<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Liquid Metal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    overflow: hidden;
    background: #0a0a0a;
    cursor: crosshair;
    font-family: 'Inter', system-ui, sans-serif;
  }
  canvas { display: block; }
  #info {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    letter-spacing: 0.15em;
    pointer-events: none;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div id="info">移动鼠标 — 液态金属涟漪</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.157.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ── 场景初始化 ──────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 5);
camera.lookAt(0, 0, 0);

// ── 自定义着色器材质 ─────────────────────────────
const vertexShader = /* glsl */ `
  varying vec3 vPos;
  varying vec3 vNormal;
  varying vec2 vUv;
  varying float vDisplacement;

  uniform float uTime;
  uniform vec2 uMouse;
  uniform float uMouseIntensity;

  // 经典 3D Simplex-like noise
  float hash(vec3 p) {
    float h = dot(p, vec3(127.1, 311.7, 74.7));
    return fract(sin(h) * 43758.5453);
  }

  float noise(vec3 p) {
    vec3 i = floor(p);
    vec3 f = fract(p);
    f = f * f * (3.0 - 2.0 * f);

    return mix(
      mix(
        mix(hash(i + vec3(0,0,0)), hash(i + vec3(1,0,0)), f.x),
        mix(hash(i + vec3(0,1,0)), hash(i + vec3(1,1,0)), f.x),
        f.y
      ),
      mix(
        mix(hash(i + vec3(0,0,1)), hash(i + vec3(1,0,1)), f.x),
        mix(hash(i + vec3(0,1,1)), hash(i + vec3(1,1,1)), f.x),
        f.y
      ),
      f.z
    );
  }

  float fbm(vec3 p) {
    float v = 0.0;
    float a = 0.5;
    float freq = 1.0;
    for (int i = 0; i < 5; i++) {
      v += a * noise(p * freq);
      freq *= 2.0;
      a *= 0.5;
    }
    return v;
  }

  void main() {
    vec3 pos = position;

    // 多层波浪
    float wave1 = sin(pos.x * 2.5 + uTime * 0.7) * cos(pos.y * 2.8 + uTime * 0.6) * 0.25;
    float wave2 = sin(pos.x * 5.3 - uTime * 0.9) * cos(pos.y * 4.7 + uTime * 0.8) * 0.15;
    float wave3 = cos(pos.x * 7.1 + uTime * 1.1) * sin(pos.y * 6.3 - uTime * 0.5) * 0.1;

    // FBM 噪声层
    float noiseVal = fbm(pos * 2.5 + uTime * 0.3) * 0.35;

    // 鼠标涟漪
    float dist = length(pos.xy - uMouse);
    float ripple = exp(-dist * 3.5) * sin(dist * 12.0 - uTime * 3.0) * uMouseIntensity * 0.4;
    float bulge = exp(-dist * 2.0) * uMouseIntensity * 0.15;

    float displacement = wave1 + wave2 + wave3 + noiseVal + ripple + bulge;
    pos.z += displacement;

    vDisplacement = displacement;
    vPos = pos;
    vUv = uv;

    // 近似法线
    float eps = 0.02;
    float dx = (
      sin((position.x + eps) * 2.5 + uTime * 0.7) * cos(position.y * 2.8 + uTime * 0.6) * 0.25 +
      sin((position.x + eps) * 5.3 - uTime * 0.9) * cos(position.y * 4.7 + uTime * 0.8) * 0.15 +
      cos((position.x + eps) * 7.1 + uTime * 1.1) * sin(position.y * 6.3 - uTime * 0.5) * 0.1 +
      fbm(vec3(position.x + eps, position.y, position.z) * 2.5 + uTime * 0.3) * 0.35 -
      displacement
    ) / eps;
    float dy = (
      sin(position.x * 2.5 + uTime * 0.7) * cos((position.y + eps) * 2.8 + uTime * 0.6) * 0.25 +
      sin(position.x * 5.3 - uTime * 0.9) * cos((position.y + eps) * 4.7 + uTime * 0.8) * 0.15 +
      cos(position.x * 7.1 + uTime * 1.1) * sin((position.y + eps) * 6.3 - uTime * 0.5) * 0.1 +
      fbm(vec3(position.x, position.y + eps, position.z) * 2.5 + uTime * 0.3) * 0.35 -
      displacement
    ) / eps;

    vec3 approxNormal = normalize(vec3(-dx, -dy, 1.0));
    vNormal = normalMatrix * approxNormal;

    gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
  }
`;

const fragmentShader = /* glsl */ `
  varying vec3 vPos;
  varying vec3 vNormal;
  varying vec2 vUv;
  varying float vDisplacement;

  uniform float uTime;
  uniform vec3 uColor1;
  uniform vec3 uColor2;
  uniform vec3 uColor3;
  uniform vec3 uLightPos1;
  uniform vec3 uLightPos2;

  void main() {
    vec3 normal = normalize(vNormal);

    // 动态光源1
    vec3 lightDir1 = normalize(uLightPos1 - vPos);
    float diff1 = max(dot(normal, lightDir1), 0.0);
    float spec1 = pow(max(dot(reflect(-lightDir1, normal), normalize(vec3(0,0,1))), 0.0), 80.0);

    // 动态光源2
    vec3 lightDir2 = normalize(uLightPos2 - vPos);
    float diff2 = max(dot(normal, lightDir2), 0.0) * 0.6;
    float spec2 = pow(max(dot(reflect(-lightDir2, normal), normalize(vec3(0,0,1))), 0.0), 60.0) * 0.7;

    // 环境光
    float ambient = 0.15;

    // 菲涅尔效果
    float fresnel = pow(1.0 - abs(dot(normal, vec3(0,0,1))), 3.0);

    // 颜色混合 — 基于位移和UV
    float colorMix = vDisplacement * 1.5 + 0.5;
    vec3 baseColor = mix(uColor1, uColor2, colorMix);
    baseColor = mix(baseColor, uColor3, fresnel * 0.5);
    baseColor = mix(baseColor, uColor3, vUv.y * 0.3);

    // 彩虹色偏移
    float iridescence = sin(vUv.x * 10.0 + uTime * 0.5) * 0.05 + sin(vUv.y * 12.0 - uTime * 0.4) * 0.05;
    baseColor += iridescence * 0.1;

    // 合成光照
    vec3 lit = baseColor * (ambient + diff1 + diff2);
    lit += uColor1 * spec1 * 0.8;
    lit += uColor1 * spec2 * 0.5;

    // 边缘高亮
    lit += uColor3 * fresnel * 0.25;

    // 微妙的暗角
    float vignette = 1.0 - length(vUv - 0.5) * 0.3;
    lit *= vignette;

    gl_FragColor = vec4(lit, 1.0);
  }
`;

// ── 几何体 ──────────────────────────────────────
const geometry = new THREE.PlaneGeometry(8, 5, 256, 160);
geometry.rotateX(-0.3);

const uniforms = {
  uTime: { value: 0 },
  uMouse: { value: new THREE.Vector2(0, 0) },
  uMouseIntensity: { value: 0 },
  uColor1: { value: new THREE.Color('#c0c8d8') },  // 银白
  uColor2: { value: new THREE.Color('#8899bb') },  // 蓝灰
  uColor3: { value: new THREE.Color('#556688') },  // 深蓝灰
  uLightPos1: { value: new THREE.Vector3(3, 2, 4) },
  uLightPos2: { value: new THREE.Vector3(-2, -1, 3) },
};

const material = new THREE.ShaderMaterial({
  vertexShader,
  fragmentShader,
  uniforms,
  side: THREE.DoubleSide,
});

const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

// ── 粒子层 ──────────────────────────────────────
const particlesGeo = new THREE.BufferGeometry();
const particlesCount = 600;
const particlesPositions = new Float32Array(particlesCount * 3);
const particlesSizes = new Float32Array(particlesCount);

for (let i = 0; i < particlesCount; i++) {
  particlesPositions[i * 3] = (Math.random() - 0.5) * 7;
  particlesPositions[i * 3 + 1] = (Math.random() - 0.5) * 4;
  particlesPositions[i * 3 + 2] = Math.random() * 1.5;
  particlesSizes[i] = Math.random() * 3 + 1;
}

particlesGeo.setAttribute('position', new THREE.BufferAttribute(particlesPositions, 3));
particlesGeo.setAttribute('size', new THREE.BufferAttribute(particlesSizes, 1));

const particlesMat = new THREE.ShaderMaterial({
  vertexShader: /* glsl */ `
    attribute float size;
    varying float vAlpha;
    uniform float uTime;
    void main() {
      vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = size * (150.0 / -mvPosition.z);
      gl_Position = projectionMatrix * mvPosition;
      vAlpha = 0.35 + 0.2 * sin(position.x * 3.0 + uTime);
    }
  `,
  fragmentShader: /* glsl */ `
    varying float vAlpha;
    void main() {
      float d = length(gl_PointCoord - 0.5) * 2.0;
      float alpha = smoothstep(1.0, 0.0, d) * vAlpha * 0.5;
      gl_FragColor = vec4(1.0, 1.0, 1.0, alpha);
    }
  `,
  uniforms: { uTime: { value: 0 } },
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});

const particles = new THREE.Points(particlesGeo, particlesMat);
scene.add(particles);

// ── 鼠标追踪 ────────────────────────────────────
const mouse = { x: 0, y: 0, targetX: 0, targetY: 0 };
const mouseWorld = new THREE.Vector2(0, 0);

window.addEventListener('mousemove', (e) => {
  mouse.targetX = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.targetY = -(e.clientY / window.innerHeight) * 2 + 1;
});

// 触摸支持
window.addEventListener('touchmove', (e) => {
  mouse.targetX = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
  mouse.targetY = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
}, { passive: true });

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

// ── 动画循环 ────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.1);
  const elapsed = performance.now() * 0.001;

  // 平滑鼠标
  mouse.x += (mouse.targetX - mouse.x) * 5 * dt;
  mouse.y += (mouse.targetY - mouse.y) * 5 * dt;

  // 屏幕坐标 → 世界坐标 (平面映射)
  mouseWorld.set(mouse.x * 4, mouse.y * 2.5);

  // 更新 uniforms
  uniforms.uTime.value = elapsed;
  uniforms.uMouse.value.copy(mouseWorld);
  uniforms.uMouseIntensity.value +=
    ((Math.abs(mouse.targetX - mouse.x) + Math.abs(mouse.targetY - mouse.y)) * 3 - uniforms.uMouseIntensity.value) *
    Math.min(dt * 8, 1);

  // 移动光源
  uniforms.uLightPos1.value.set(
    Math.cos(elapsed * 0.4) * 3,
    Math.sin(elapsed * 0.6) * 2,
    4 + Math.sin(elapsed * 0.3) * 1
  );
  uniforms.uLightPos2.value.set(
    Math.cos(elapsed * 0.5 + 2) * 2.5,
    Math.sin(elapsed * 0.7 + 1) * 1.5,
    3 + Math.cos(elapsed * 0.4) * 1.5
  );

  // 粒子动画
  const posArr = particlesGeo.attributes.position.array;
  for (let i = 0; i < particlesCount; i++) {
    posArr[i * 3 + 2] += Math.sin(elapsed * 2 + i * 0.1) * 0.003;
    if (posArr[i * 3 + 2] > 1.8) posArr[i * 3 + 2] = 0.1;
    if (posArr[i * 3 + 2] < 0.05) posArr[i * 3 + 2] = 0.1;
  }
  particlesGeo.attributes.position.needsUpdate = true;
  particlesMat.uniforms.uTime.value = elapsed;

  // 相机微动
  camera.position.x += (mouse.x * 0.3 - camera.position.x) * 2 * dt;
  camera.position.y += (1.5 - mouse.y * 0.2 - camera.position.y) * 2 * dt;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
