<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Web Proxy</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #21262d; --border: #30363d;
    --text: #c9d1d9; --text2: #8b949e; --accent: #58a6ff; --green: #3fb950;
    --orange: #d2991d; --red: #f85149;
    --term-bg: #0a0e13; --html-bg: #0d1117;
    --font-mono: "SF Mono", "Cascadia Code", Consolas, Monaco, monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
  }
  [data-theme="light"] {
    --bg: #ffffff; --surface: #f6f8fa; --surface2: #eaeef2; --border: #d0d7de;
    --text: #1f2328; --text2: #656d76; --accent: #0969da; --green: #1a7f37;
    --orange: #9a6700; --red: #cf222e;
    --term-bg: #f6f8fa; --html-bg: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    height: 100vh; overflow: hidden; display: flex;
    background: var(--bg); color: var(--text); font-family: var(--font-sans);
  }
  .sidebar {
    width: 220px; flex-shrink: 0; display: flex; flex-direction: column;
    background: var(--surface); border-right: 1px solid var(--border);
  }
  .sidebar-header { padding: 16px 14px; border-bottom: 1px solid var(--border); position: relative; }
  .sidebar-header h1 { font-size: 15px; color: var(--text); margin-bottom: 2px; }
  .sidebar-header span { font-size: 11px; color: var(--text2); }
  .theme-toggle {
    position: absolute; right: 10px; top: 14px;
    width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--text2); cursor: pointer;
    font-size: 15px; line-height: 26px; text-align: center; padding: 0;
    transition: color .12s, border-color .12s;
  }
  .theme-toggle:hover { color: var(--accent); border-color: var(--accent); }
  .dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--green); margin-right: 6px; animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
  .sidebar-info { padding: 14px; font-size: 11px; color: var(--text2); line-height: 1.8; }
  .sidebar-info strong { color: var(--text); }
  .sidebar-info { padding: 10px 14px; font-size: 11px; color: var(--text2); }
  .sidebar-info strong { color: var(--accent); }
  .section-title {
    padding: 8px 14px; font-size: 11px; color: var(--text2); font-weight: 700;
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; user-select: none; transition: color .15s;
  }
  .section-title:hover { color: var(--text); }
  .section-title .arrow {
    display: inline-block; width: 14px; font-size: 9px; transition: transform .2s;
  }
  .section-title .arrow.open { transform: rotate(90deg); }
  .page-count { font-weight: 400; color: var(--text2); font-size: 10px; }
  .page-refresh {
    width: 20px; height: 20px; border-radius: 4px; border: none;
    background: transparent; color: var(--text2); cursor: pointer;
    font-size: 13px; line-height: 20px; text-align: center; padding: 0;
    transition: color .12s;
  }
  .page-refresh:hover { color: var(--accent); }
  .collapsible-body {
    overflow: hidden; transition: max-height .35s ease;
  }
  #pageListBody { max-height: 2000px; }
  #pageListBody.collapsed { max-height: 0; }
  #pageList { overflow-y: auto; padding: 4px 0; }
  #knowledgeBody { max-height: 2000px; }
  #knowledgeBody.collapsed { max-height: 0; }
  #knowledgeTree { overflow-y: auto; max-height: 200px; padding: 2px 0; }
  .kt-item { padding: 3px 8px 3px 14px; cursor: pointer; font-size: 11px; color: var(--text); }
  .kt-item:hover { background: var(--surface2); }
  .kt-dir { font-weight: 600; }
  .kt-toggle { display: inline-block; width: 12px; color: var(--text2); font-size: 10px; }
  .kt-name { margin-left: 2px; }
  .kt-children { display: none; }
  .kt-children.open { display: block; }
  .page-item {
    padding: 7px 14px; cursor: pointer; border-left: 3px solid transparent;
    transition: background .12s, border-color .12s;
  }
  .page-item:hover { background: var(--surface2); }
  .page-item.active { border-left-color: var(--accent); background: rgba(88,166,255,.06); }
  .page-item-name {
    color: var(--text); font-size: 12px; line-height: 1.3;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .page-item.active .page-item-name { color: var(--accent); font-weight: 600; }
  .page-item { position: relative; }
  .page-item-meta { color: var(--text2); font-size: 10px; margin-top: 1px; }
  .page-item-actions {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    display: flex; align-items: center; gap: 4px;
  }
  .page-item-del {
    width: 22px; height: 22px; border-radius: 4px; border: none;
    background: transparent; color: var(--text2); cursor: pointer;
    font-size: 15px; line-height: 22px; text-align: center; opacity: 0;
    transition: opacity .12s, color .12s, background .12s; flex-shrink: 0;
  }
  .page-item:hover .page-item-del { opacity: 1; }
  .page-item-del:hover { color: var(--red); background: rgba(248,81,73,.12); }
  .page-item-confirm {
    font-size: 11px; height: 22px; padding: 0 7px; border-radius: 4px;
    border: 1px solid var(--red); background: rgba(248,81,73,.08);
    color: var(--red); cursor: pointer; white-space: nowrap;
    transition: background .12s; flex-shrink: 0;
  }
  .page-item-confirm:hover { background: rgba(248,81,73,.22); }
  .page-item-cancel {
    width: 22px; height: 22px; border-radius: 4px; border: 1px solid var(--border);
    background: transparent; color: var(--text2); cursor: pointer;
    font-size: 14px; line-height: 20px; text-align: center; flex-shrink: 0;
  }
  .page-item-cancel:hover { color: var(--text); background: var(--surface2); }
  .sidebar-footer { padding: 10px 14px; border-top: 1px solid var(--border); }
  .sidebar-footer button {
    width: 100%; height: 30px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); cursor: pointer; font-size: 12px;
  }
  .sidebar-footer button:hover { border-color: var(--accent); color: var(--accent); }

  .main {
    flex: 1; min-width: 0; height: 100vh; display: flex; flex-direction: column;
  }
  .html-pane { flex: 1; min-height: 0; overflow: auto; background: var(--html-bg); position: relative; }
  .html-empty {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
    color: var(--text2); text-align: center; font-size: 14px; pointer-events: none;
  }
  .html-empty .icon { font-size: 40px; opacity: .4; }
  .html-frame { width: 100%; height: 100%; border: 0; display: block; }

  .divider {
    height: 4px; flex-shrink: 0; background: var(--border); cursor: row-resize;
    position: relative; transition: background .15s;
  }
  .divider:hover, .divider.dragging { background: var(--accent); }
  .divider::after {
    content: ''; position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
    width: 28px; height: 3px; border-radius: 2px; background: var(--text2); opacity: .5;
  }

  .terminal-pane {
    flex: 1; min-height: 0; overflow: hidden; background: var(--term-bg);
  }
  .terminal-pane .xterm { height: 100%; padding: 4px 0 0 8px; }

  .status-bar {
    flex-shrink: 0; height: 26px; display: flex; align-items: center; gap: 10px;
    padding: 0 16px; background: var(--surface2); border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text2);
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; }
  .status-dot.idle { background: var(--text2); }
  .status-dot.active { background: var(--accent); animation: pulse 1s ease-in-out infinite; }
  .status-dot.done { background: var(--green); }
  .status-dot.error { background: var(--red); }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  @media (max-width: 760px) {
    .sidebar { display: none; }
  }
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-header">
    <h1><span class="dot"></span>Claude Code</h1>
    <span>ccr code · 实时网页代理</span>
    <button class="theme-toggle" title="切换主题" onclick="toggleTheme()">&#x263e;</button>
  </div>
  <div class="sidebar-info">
    当前: <strong id="currentPageLabel">无</strong>
  </div>
  <div class="section-title" onclick="toggleSection('pageListBody', this)">
    <span><span class="arrow open">&#x25b6;</span> <button class="page-refresh" title="刷新列表" onclick="event.stopPropagation(); loadPages()">&#x21bb;</button> HTML 页面</span>
    <span class="page-count" id="pageCount"></span>
  </div>
  <div class="collapsible-body" id="pageListBody">
    <div id="pageList"><div style="color:var(--text2);font-style:italic;padding:12px 14px">加载中...</div></div>
  </div>
  <div class="section-title" onclick="toggleSection('knowledgeBody', this)">
    <span><span class="arrow open">&#x25b6;</span> &#x1F4DA; 知识库</span>
    <button class="page-refresh" title="刷新知识库" onclick="event.stopPropagation(); loadKnowledgeTree()">&#x21bb;</button>
  </div>
  <div class="collapsible-body" id="knowledgeBody">
    <div id="knowledgeTree"><div style="color:var(--text2);font-style:italic;padding:8px 14px">加载中...</div></div>
  </div>
  <div class="sidebar-footer">
    <button type="button" onclick="resetSession()">重置会话</button>
  </div>
</aside>

<main class="main">
  <section class="html-pane" id="htmlPane">
    <div class="html-empty" id="htmlEmpty">
      <div class="icon">&#x25B2;</div>
      <div>HTML 渲染区</div>
      <div style="font-size:12px">Claude 生成的网页将在这里展示</div>
    </div>
  </section>

  <div class="divider" id="divider"></div>

  <section class="terminal-pane" id="terminalPane">
    <div id="terminal" style="width:100%;height:100%"></div>
  </section>

  <div class="status-bar">
    <span class="status-dot idle" id="statusDot"></span>
    <span id="statusLabel">就绪</span>
    <span style="margin-left:auto" id="htmlStatus"></span>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
<script>
let lastHtmlContent = '';
let knownPageNames = new Set();
let wsReconnectTimer = null;
let wsReconnectDelay = 1000;

const htmlPane = document.getElementById('htmlPane');
const htmlEmpty = document.getElementById('htmlEmpty');
const terminalPane = document.getElementById('terminalPane');
const divider = document.getElementById('divider');
const statusDot = document.getElementById('statusDot');
const statusLabel = document.getElementById('statusLabel');
const htmlStatus = document.getElementById('htmlStatus');

function escapeHtml(value) {
  return String(value).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function setStatus(state, message) {
  statusDot.className = 'status-dot ' + state;
  statusLabel.textContent = message;
}

let activePage = null;

function switchToPage(name) {
  activePage = name;
  let frame = htmlPane.querySelector('.html-frame');
  if (!frame) {
    htmlEmpty.style.display = 'none';
    frame = document.createElement('iframe');
    frame.className = 'html-frame';
    frame.title = 'HTML 渲染结果';
    htmlPane.appendChild(frame);
  }
  frame.src = '/g/' + encodeURIComponent(name) + '?_=' + Date.now();
  document.getElementById('currentPageLabel').textContent = name;
  document.querySelectorAll('.page-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === name);
  });
  htmlStatus.textContent = new Date().toLocaleTimeString('zh-CN') + ' 已切换';
}

// ---- Theme ----
function getTheme() {
  return document.documentElement.getAttribute('data-theme') || 'dark';
}

const TERM_THEMES = {
  dark:  { background: '#0a0e13', foreground: '#c9d1d9', cursor: '#58a6ff' },
  light: { background: '#f6f8fa', foreground: '#1f2328', cursor: '#0969da' },
};

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('ccrich-theme', theme);
  const btn = document.querySelector('.theme-toggle');
  if (btn) btn.innerHTML = theme === 'light' ? '&#x263c;' : '&#x263e;';
  Object.assign(term.options, { theme: TERM_THEMES[theme] || TERM_THEMES.dark });
}

function toggleTheme() {
  applyTheme(getTheme() === 'dark' ? 'light' : 'dark');
}

// ---- xterm.js init ----
const term = new Terminal({
  cursorBlink: true,
  theme: { background: '#0a0e13', foreground: '#c9d1d9', cursor: '#58a6ff' },
  fontSize: 13.5,
  fontFamily: '"SF Mono", "Cascadia Code", Consolas, Monaco, monospace',
  allowProposedApi: true,
});

// 初始主题
(function initTheme() {
  const saved = localStorage.getItem('ccrich-theme');
  const theme = saved || 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  const btn = document.querySelector('.theme-toggle');
  if (btn) btn.innerHTML = theme === 'light' ? '&#x263c;' : '&#x263e;';
  if (theme === 'light') {
    Object.assign(term.options, { theme: TERM_THEMES.light });
  }
})();

const fitAddon = new FitAddon.FitAddon();
term.loadAddon(fitAddon);
term.loadAddon(new WebLinksAddon.WebLinksAddon());

term.open(document.getElementById('terminal'));
fitAddon.fit();

function sendResize() {
  if (!termSocket || termSocket.readyState !== WebSocket.OPEN) return;
  const dims = fitAddon.proposeDimensions();
  if (dims) {
    termSocket.send(JSON.stringify({ type: 'resize', cols: dims.cols, rows: dims.rows }));
  }
}

term.onResize(() => sendResize());

// ---- WebSocket terminal ----
let termSocket = null;

function connectTerminal() {
  if (termSocket && termSocket.readyState === WebSocket.OPEN) return;

  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = `${proto}//${location.hostname}:${parseInt(location.port || '3000') + 1}`;

  setStatus('active', '连接终端...');
  termSocket = new WebSocket(wsUrl);
  termSocket.binaryType = 'arraybuffer';

  termSocket.onopen = () => {
    setStatus('idle', '终端已连接');
    wsReconnectDelay = 1000;
    term.onData(data => {
      if (termSocket.readyState === WebSocket.OPEN) {
        termSocket.send(new TextEncoder().encode(data));
      }
    });
    sendResize();
    term.focus();
  };

  termSocket.onmessage = (event) => {
    if (event.data instanceof ArrayBuffer) {
      term.write(new Uint8Array(event.data));
    }
  };

  termSocket.onclose = () => {
    setStatus('error', '终端断开，自动重连...');
    term.onData(() => {});
    if (wsReconnectTimer) clearTimeout(wsReconnectTimer);
    wsReconnectTimer = setTimeout(() => {
      wsReconnectDelay = Math.min(wsReconnectDelay * 2, 15000);
      connectTerminal();
    }, wsReconnectDelay);
  };

  termSocket.onerror = () => {
    if (termSocket.readyState === WebSocket.OPEN) return;
    setStatus('error', '终端连接失败，自动重连...');
  };
}

// ---- Polling: HTML output + page list ----
async function pollOutput() {
  try {
    // 1. 检测 claude-output.html 内容变化 (HTTP API 模式)
    const outResp = await fetch('/api/read-output');
    const outData = await outResp.json();
    if (outData.found && outData.html && outData.html !== lastHtmlContent) {
      lastHtmlContent = outData.html;
      switchToPage('claude-output.html');
      htmlStatus.textContent = new Date().toLocaleTimeString('zh-CN') + ' claude-output 已更新';
    }

    // 2. 检测 public/ 下新出现的 HTML 页面 (终端模式可能不写 claude-output.html)
    const pagesResp = await fetch('/api/pages');
    const pagesData = await pagesResp.json();
    if (pagesData.pages && pagesData.pages.length > 0) {
      const currentPages = new Set(pagesData.pages.map(p => p.name));
      const newPages = [...currentPages].filter(p => !knownPageNames.has(p));
      if (newPages.length > 0) {
        switchToPage(pagesData.pages[0].name);
        htmlStatus.textContent = new Date().toLocaleTimeString('zh-CN') + ' 新页面: ' + newPages.join(', ');
      }
      knownPageNames = currentPages;
    }

    // 3. 用已获取的数据刷新侧边栏，避免重复请求
    renderPageList(pagesData.pages || []);
  } catch (e) { /* ignore */ }
}

function renderHtml(html) {
  let frame = htmlPane.querySelector('.html-frame');
  if (!frame) {
    htmlEmpty.style.display = 'none';
    frame = document.createElement('iframe');
    frame.className = 'html-frame';
    frame.title = 'HTML 渲染结果';
    htmlPane.appendChild(frame);
  }
  const doc = frame.contentDocument || frame.contentWindow.document;
  doc.open();
  doc.write(html);
  doc.close();
}

// ---- Divider drag ----
let dragging = false;

divider.addEventListener('mousedown', (e) => {
  dragging = true;
  divider.classList.add('dragging');
  document.body.style.cursor = 'row-resize';
  document.body.style.userSelect = 'none';
  const frame = htmlPane.querySelector('.html-frame');
  if (frame) frame.style.pointerEvents = 'none';
  e.preventDefault();
});

document.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const main = document.querySelector('.main');
  const rect = main.getBoundingClientRect();
  const totalHeight = rect.height - divider.offsetHeight;
  const y = e.clientY - rect.top;
  const ratio = Math.max(0.1, Math.min(0.9, y / totalHeight));

  htmlPane.style.flex = '0 0 ' + (ratio * 100) + '%';
  terminalPane.style.flex = '0 0 ' + ((1 - ratio) * 100) + '%';
});

document.addEventListener('mouseup', () => {
  if (!dragging) return;
  dragging = false;
  divider.classList.remove('dragging');
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
  const frame = htmlPane.querySelector('.html-frame');
  if (frame) frame.style.pointerEvents = '';
  requestAnimationFrame(() => {
    fitAddon.fit();
    sendResize();
  });
});

window.addEventListener('resize', () => {
  fitAddon.fit();
  sendResize();
});

// ---- Pages ----
let deletePending = null;

function renderPageList(pages) {
  const list = document.getElementById('pageList');
  deletePending = null;
  document.getElementById('pageCount').textContent = pages.length ? pages.length + ' 个' : '';
  if (pages.length === 0) {
    list.innerHTML = '<div style="color:var(--text2);font-style:italic;padding:8px 14px">暂无页面</div>';
    return;
  }
  list.innerHTML = pages.map(p => {
    const time = new Date(p.mtime * 1000).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    const size = p.size > 1024 ? (p.size / 1024).toFixed(1) + 'K' : p.size + 'B';
    const active = activePage === p.name ? ' active' : '';
    const safeName = escapeHtml(p.name);
    return `<div class="page-item${active}" data-page="${safeName}">
      <div style="flex:1;min-width:0" onclick="switchToPage('${safeName}')">
        <div class="page-item-name">${safeName}</div>
        <div class="page-item-meta">${time} · ${size}</div>
      </div>
      <div class="page-item-actions" data-actions="${safeName}">
        <button class="page-item-del" data-del="${safeName}">&times;</button>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('pageList').addEventListener('click', (e) => {
  const delBtn = e.target.closest('.page-item-del');
  const confirmBtn = e.target.closest('.page-item-confirm');
  const cancelBtn = e.target.closest('.page-item-cancel');

  if (confirmBtn) {
    const actions = confirmBtn.closest('.page-item-actions');
    const name = actions ? actions.dataset.actions : '';
    if (name) executeDelete(name);
    return;
  }

  if (cancelBtn) {
    cancelDeleteConfirm();
    return;
  }

  if (delBtn) {
    e.stopPropagation();
    const name = delBtn.dataset.del;
    if (!name) return;
    // 如果已有另一个确认状态，先取消
    if (deletePending && deletePending !== name) cancelDeleteConfirm();
    // 切换到确认状态
    showDeleteConfirm(delBtn, name);
    return;
  }

  // 点击其他区域取消确认
  if (deletePending) cancelDeleteConfirm();
});

function showDeleteConfirm(delBtn, name) {
  deletePending = name;
  const actions = delBtn.parentElement;
  delBtn.remove();
  actions.insertAdjacentHTML('beforeend',
    '<button class="page-item-confirm">确认</button>' +
    '<button class="page-item-cancel">&times;</button>'
  );
}

function cancelDeleteConfirm() {
  if (!deletePending) return;
  const actions = document.querySelector(`.page-item-actions[data-actions="${CSS.escape(deletePending)}"]`);
  if (actions) {
    actions.innerHTML = `<button class="page-item-del" data-del="${escapeHtml(deletePending)}">&times;</button>`;
  }
  deletePending = null;
}

async function executeDelete(name) {
  deletePending = null;
  try {
    const resp = await fetch('/api/pages/' + encodeURIComponent(name), { method: 'DELETE' });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    if (activePage === name) {
      activePage = null;
      const frame = htmlPane.querySelector('.html-frame');
      if (frame) { frame.remove(); }
      htmlEmpty.style.display = '';
      document.getElementById('currentPageLabel').textContent = '无';
    }
    knownPageNames.delete(name);
    loadPages();
  } catch (e) {
    alert('删除失败: ' + e.message);
    loadPages();
  }
}

async function loadPages() {
  try {
    const resp = await fetch('/api/pages');
    const data = await resp.json();
    const pages = data.pages || [];
    knownPageNames = new Set(pages.map(p => p.name));
    renderPageList(pages);
  } catch (e) {
    document.getElementById('pageList').innerHTML = '<div style="color:var(--red);padding:8px 14px">加载失败</div>';
  }
}

async function resetSession() {
  try { await fetch('/api/reset', { method: 'POST' }); } catch (e) {}
  activePage = null;
  lastHtmlContent = '';
  knownPageNames = new Set();
  const frame = htmlPane.querySelector('.html-frame');
  if (frame) { frame.remove(); }
  htmlEmpty.style.display = '';
  htmlStatus.textContent = '';
  document.getElementById('currentPageLabel').textContent = '无';
  setStatus('idle');
  loadPages();
}

// ---- Knowledge tree ----
async function loadKnowledgeTree() {
  const tree = document.getElementById('knowledgeTree');
  try {
    const resp = await fetch('/api/knowledge');
    const data = await resp.json();
    if (!data.tree || data.tree.length === 0) {
      tree.innerHTML = '<div style="color:var(--text2);font-style:italic;padding:4px 14px">空</div>';
      return;
    }
    tree.innerHTML = data.tree.map(n => renderKnowledgeNode(n, 0)).join('');
  } catch (e) {
    tree.innerHTML = '<div style="color:var(--red);padding:4px 14px;font-size:11px">加载失败</div>';
  }
}

function renderKnowledgeNode(node, depth) {
  const pad = 14 + depth * 14;
  if (node.type === 'truncated') {
    return `<div class="kt-item" style="padding-left:${pad}px;color:var(--text2);font-style:italic">
      <span class="kt-toggle"></span><span class="kt-name">${escapeHtml(node.name)}</span>
    </div>`;
  }
  if (node.type === 'symlink') {
    return `<div class="kt-item" style="padding-left:${pad}px;opacity:.85"
      title="符号链接（不可展开）" onclick="event.stopPropagation();previewKnowledge('${escapeHtml(node.path)}')">
      <span class="kt-toggle">&#x21aa;</span><span class="kt-name">${escapeHtml(node.name)}</span>
    </div>`;
  }
  if (node.type === 'dir') {
    const hasKids = node.children && node.children.length > 0;
    const id = 'k_' + node.path.replace(/[^a-zA-Z0-9]/g, '_');
    let html = `<div class="kt-item kt-dir" style="padding-left:${pad}px" data-kid="${id}">`;
    if (hasKids) html += `<span class="kt-toggle" onclick="event.stopPropagation();toggleKNode('${id}')">&#x25b6;</span>`;
    else html += `<span class="kt-toggle"></span>`;
    html += `<span class="kt-name">${escapeHtml(node.name)}/</span></div>`;
    if (hasKids) {
      html += `<div class="kt-children" id="${id}">${node.children.map(c => renderKnowledgeNode(c, depth + 1)).join('')}</div>`;
    }
    return html;
  }
  return `<div class="kt-item" style="padding-left:${pad}px" onclick="event.stopPropagation();previewKnowledge('${escapeHtml(node.path)}')">
    <span class="kt-toggle"></span><span class="kt-name">${escapeHtml(node.name)}</span>
  </div>`;
}

function toggleKNode(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const open = el.classList.toggle('open');
  const item = document.querySelector(`[data-kid="${id}"]`);
  if (item) {
    const tgl = item.querySelector('.kt-toggle');
    if (tgl) tgl.innerHTML = open ? '&#x25bc;' : '&#x25b6;';
  }
}

async function previewKnowledge(path) {
  try {
    const resp = await fetch('/api/knowledge/read?path=' + encodeURIComponent(path));
    const data = await resp.json();
    if (data.error) { alert(data.error); return; }
    // 在 HTML 预览区展示文件内容
    let frame = htmlPane.querySelector('.html-frame');
    if (!frame) {
      htmlEmpty.style.display = 'none';
      frame = document.createElement('iframe');
      frame.className = 'html-frame';
      frame.title = '预览';
      htmlPane.appendChild(frame);
    }
    const doc = frame.contentDocument || frame.contentWindow.document;
    doc.open();
    doc.write(`<!doctype html><html><head><meta charset="UTF-8"><style>
      body { margin:0; padding:20px 28px; font-family:${getComputedStyle(document.body).fontFamily};
        background:var(--html-bg, #0d1117); color:var(--text, #c9d1d9); }
      pre { white-space:pre-wrap; line-height:1.6; font-size:13px;
        background:var(--surface, #161b22); padding:16px; border-radius:6px; border:1px solid var(--border, #30363d); }
      .meta { color:var(--text2, #8b949e); font-size:12px; margin-bottom:12px; }
    </style></head><body>
      <div class="meta">${escapeHtml(path)} · ${data.size} bytes</div>
      <pre>${escapeHtml(data.content)}</pre>
    </body></html>`);
    doc.close();
    document.getElementById('currentPageLabel').textContent = path;
  } catch (e) {
    alert('读取失败: ' + e.message);
  }
}

function toggleSection(bodyId, titleEl) {
  const body = document.getElementById(bodyId);
  if (!body) return;
  body.classList.toggle('collapsed');
  const arrow = titleEl.querySelector('.arrow');
  if (arrow) arrow.classList.toggle('open');
}

// ---- Init ----
connectTerminal();
loadPages();
loadKnowledgeTree();
pollOutput();
setInterval(pollOutput, 2000);
</script>
